name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  Job 1: Test backend
  # ─────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run OT unit tests
        run: npx jest src/__tests__/unit/ot.test.js --no-coverage
        working-directory: server

      - name: Run sandbox unit tests
        run: npx jest src/__tests__/unit/sandbox.test.js --no-coverage
        working-directory: server
        env:
          SANDBOX_TIMEOUT_MS: "15000"

      - name: Run API integration tests
        run: npx jest src/__tests__/integration/ --no-coverage --runInBand
        working-directory: server
        env:
          NODE_ENV: test
          PORT: "5001"
          MONGODB_URI_TEST: mongodb://localhost:27017/codecollab_test
          JWT_SECRET: test_secret_ci

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  #  Job 2: Lint & build frontend
  # ─────────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build React app
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ""
          VITE_WS_URL: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────
  #  Job 3: Docker build (verify image builds correctly)
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validates Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: codecollab:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  #  Job 4: Deploy to EC2 (main branch only)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # Requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /opt/codecollab

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing server deps ──"
            cd server && npm ci --omit=dev && cd ..

            echo "── Building frontend ──"
            cd client
            npm ci
            npm run build
            sudo cp -r dist/. /var/www/codecollab/
            cd ..

            echo "── Zero-downtime reload ──"
            pm2 reload codecollab --update-env

            echo "── Health check ──"
            sleep 3
            bash scripts/healthcheck.sh localhost

            echo "── Deploy complete ✓ ──"
