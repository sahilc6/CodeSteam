# ─────────────────────────────────────────────────────────────────────────────
#  Shared location blocks (included by both HTTP and HTTPS server blocks)
# ─────────────────────────────────────────────────────────────────────────────

# Security headers
add_header X-Frame-Options           "SAMEORIGIN"            always;
add_header X-Content-Type-Options    "nosniff"               always;
add_header X-XSS-Protection          "1; mode=block"         always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

# Connection limits
limit_conn connlimit 50;

root  /var/www/codesteam;
index index.html;

# ── Static assets (JS/CSS/fonts) — cache 1 year ──────────────────────────
location ~* \.(js|css|woff2|woff|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires        1y;
    add_header     Cache-Control "public, immutable";
    access_log     off;
    try_files      $uri =404;
}

# ── API proxy ──────────────────────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=40 nodelay;

    proxy_pass         http://codesteam_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Don't buffer API responses
    proxy_buffering    off;
}

# ── Code execution — stricter rate limit ──────────────────────────────────
location /api/execute {
    limit_req zone=execute burst=5 nodelay;

    proxy_pass         http://codesteam_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 20s;             # Max code execution timeout
    proxy_buffering    off;
}

# ── Socket.io WebSocket upgrade ───────────────────────────────────────────
location /socket.io/ {
    limit_req zone=ws burst=20 nodelay;

    proxy_pass             http://codesteam_backend;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade           $http_upgrade;
    proxy_set_header       Connection        "upgrade";
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;

    # Keep WebSocket alive for long-lived collaborative sessions
    proxy_read_timeout     86400s;
    proxy_send_timeout     86400s;
    proxy_connect_timeout  10s;
    proxy_buffering        off;

    # WebSocket-specific: disable proxy buffering at kernel level
    tcp_nodelay            on;
}

# ── SPA fallback ──────────────────────────────────────────────────────────
location / {
    try_files $uri $uri/ /index.html;

    # index.html must never be cached (it boots the SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}

# ── Block common scanner paths ────────────────────────────────────────────
location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
location ~ /\.                         { return 444; }
