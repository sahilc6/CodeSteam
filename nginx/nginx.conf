# ─────────────────────────────────────────────────────────────────────────────
#  Nginx main config — tuned for 200+ concurrent WebSocket users
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;               # One worker per CPU core
worker_rlimit_nofile 65535;          # Max open files per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;         # Connections per worker (4096 × cores)
    use                 epoll;        # Best event model on Linux
    multi_accept        on;           # Accept all pending connections at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;           # Don't expose nginx version

    # ── Buffers ────────────────────────────────────────────────────────
    client_body_buffer_size    16k;
    client_max_body_size       2m;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # ── Compression ────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_min_length     256;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        text/xml application/xml image/svg+xml
        font/woff2 font/woff;

    # ── Connection limits ──────────────────────────────────────────────
    limit_conn_zone  $binary_remote_addr zone=perip:10m;

    include /etc/nginx/conf.d/*.conf;
}
