# ─────────────────────────────────────────────────────────────────────────────
#  Nginx server block — CodeSteam
#  Handles: static React SPA + /api proxy + /socket.io WebSocket proxy
# ─────────────────────────────────────────────────────────────────────────────

upstream codesteam_backend {
    server server:5000;       # Docker service name
    keepalive 64;             # Reuse connections to backend
}

# Rate limiting zones
limit_req_zone  $binary_remote_addr  zone=api:10m    rate=20r/s;
limit_req_zone  $binary_remote_addr  zone=ws:10m     rate=5r/s;
limit_req_zone  $binary_remote_addr  zone=execute:10m rate=3r/s;
limit_conn_zone $binary_remote_addr  zone=connlimit:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (needed for certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Comment out the redirect block below until SSL is set up,
    # then uncomment it and reload Nginx.
    # ─────────────────────────────────────────────────────────────
    # return 301 https://$host$request_uri;
    # ─────────────────────────────────────────────────────────────

    # ── Temporary HTTP block (pre-SSL) ───────────────────────────
    include /etc/nginx/conf.d/locations.conf;
}

