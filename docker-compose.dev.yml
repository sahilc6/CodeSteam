version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  CodeSteam — local development Docker Compose
#  Usage: docker-compose -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    container_name: codesteam-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: codesteam

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: codesteam-server-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/codesteam
      JWT_SECRET: dev_secret_change_in_production
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./server/src:/app/src       # Hot reload
      - /app/node_modules

volumes:
  mongo_dev_data:
